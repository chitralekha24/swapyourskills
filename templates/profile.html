<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Profile | SwapYourSkills</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #eef2f6; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .navbar { background: linear-gradient(90deg, #0d6efd, #0a58ca); }
    .card { border: none; border-radius: 14px; background: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.08); transition: transform 0.2s ease-in-out; }
    .card:hover { transform: translateY(-3px); }
    .form-label { font-weight: 600; color: #333; }
    .readonly { background: #f1f3f5; color: #555; }
    h3 { color: #0d6efd; font-weight: 700; }
    .btn-primary { background: #0d6efd; border: none; border-radius: 8px; transition: background 0.3s; }
    .btn-primary:hover { background: #0a58ca; }
    .alert-success { background: #1abc9c; color: #fff; border: none; }
    .alert-danger { background: #e74c3c; color: #fff; border: none; }
    .alert-warning { background: #f39c12; color: #fff; border: none; }
    .alert-info { background: #3498db; color: #fff; border: none; }
    .alert { border-radius: 10px; font-weight: 500; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">SwapYourSkills</a>
      <div class="d-flex gap-2">
        <a class="btn btn-light btn-sm" href="{{ url_for('dashboard') }}">Dashboard</a>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('logout') }}">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 760px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-4">
      <h3 class="mb-3">My Profile</h3>
      <p class="text-muted mb-4">Your username and email are auto-filled. Update other details below.</p>

      <form method="POST" action="{{ url_for('profile') }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" name="username" value="{{ user.username }}" class="form-control readonly" readonly />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" name="email" value="{{ user.email }}" class="form-control readonly" readonly />
          </div>

          <div class="col-md-6">
            <label class="form-label">Date of Birth</label>
            <input type="date" id="dob" name="dob" class="form-control" value="{{ user.dob or '' }}" max="{{ current_date }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Age</label>
            <input type="number" id="age" name="age" class="form-control" value="{{ user.age or '' }}">
          </div>

          <div class="col-12">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select">
              <option value="" {% if not user.gender %}selected{% endif %}>Select</option>
              <option value="Male" {% if user.gender=='Male' %}selected{% endif %}>Male</option>
              <option value="Female" {% if user.gender=='Female' %}selected{% endif %}>Female</option>
              <option value="Other" {% if user.gender=='Other' %}selected{% endif %}>Other</option>
              <option value="Prefer not to say" {% if user.gender=='Prefer not to say' %}selected{% endif %}>Prefer not to say</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Occupation</label>
            <input type="text" name="occupation" value="{{ user.occupation or '' }}" class="form-control" placeholder="e.g., Student, Developer">
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button type="submit" class="btn btn-primary px-4">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Auto-calculate Age from DOB -->
  <script>
    const dobInput = document.getElementById('dob');
    const ageInput = document.getElementById('age');

    dobInput.addEventListener('change', function() {
      if (this.value) {
        const today = new Date();
        const birthDate = new Date(this.value);
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
          age--;
        }
        ageInput.value = age;
      }
    });
  </script>
</body>
</html>
